name: Update GitHub Streak

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate streak SVG
        run: python scripts/update_github_streak.py --user Yann-Erwann --output assets/github-streak.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-streak.svg
          if git diff --cached --quiet; then
            echo "No streak changes to commit."
            exit 0
          fi
          git commit -m "chore(profile): update github streak"
          git push
